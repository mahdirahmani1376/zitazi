services:
  php:
    build:
      context: .
      dockerfile: ./Dockerfile.production
    volumes:
      - /root/zitazi/php.ini:/usr/local/etc/php/php.ini
      - /root/zitazi/src/.env:/var/www/html/.env
      - ./src:/var/www/html
    networks:
      - app-network
    container_name: zitazi-php
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: Asia/Tehran
    depends_on:
      - mysql
      - redis


  node:
    build:
      context: ./node
      dockerfile: Dockerfile.production
    container_name: zitazi-node
    restart: unless-stopped
    networks:
      - app-network
    environment:
      TZ: Asia/Tehran
      NODE_ENV: production
    shm_size: "1gb"
    mem_limit: 1500m
    command: node daemon.js
    depends_on:
      - php
      - redis

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /root/zitazi/nginx/production/default.conf:/etc/nginx/conf.d/default.conf
      - /root/.acme.sh/zitazi-crawler.ir_ecc:/etc/nginx/certs
      - ./src:/var/www/html
    depends_on:
      - php
    networks:
      - app-network
    environment:
      TZ: Asia/Tehran

    container_name: zitazi-nginx
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: 123
      TZ: Asia/Tehran

    ports:
      - "3308:3306"
    volumes:
      - /root/zitazi/mysql-conf/conf.d:/etc/mysql/conf.d
      - /root/zitazi/mysql:/var/lib/mysql
    networks:
      - app-network
    container_name: zitazi-mysql
    restart: unless-stopped

  redis:
    image: redis:latest
    volumes:
      - /root/zitazi/redis:/data
    environment:
      TZ: Asia/Tehran
    ports:
      - "6380:6379"
    networks:
      - app-network
    container_name: zitazi-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no --maxmemory 200mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: zitazi-phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: 123
      UPLOAD_LIMIT: 512M
      TZ: Asia/Tehran
    networks:
      - app-network

  loki:
    image: grafana/loki
    container_name: zitazi-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/config.yml
    volumes:
      - /root/zitazi/loki-config.yml:/etc/loki/config.yml
    networks:
      - app-network

  promtail:
    image: grafana/promtail
    container_name: zitazi-promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/zitazi/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - app-network

  grafana:
    image: grafana/grafana
    container_name: zitazi-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - loki
    networks:
      - app-network

volumes:
  mysql:
  redis:

networks:
  app-network:
    driver: bridge
