services:
  php:
    build:
      context: .
      dockerfile: ./Dockerfile-dev
    volumes:
      - ./src:/var/www/html
      - ./php.ini:/usr/local/etc/php/php.ini
      - ./supervisord.conf:/etc/supervisor/conf.d/supervisord.conf
    networks:
      - app-network
    container_name: zitazi-php
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5173:5173"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/local/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - app-network
    container_name: zitazi-nginx
    restart: unless-stopped


  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: 123
    ports:
      - "3308:3306"
    volumes:
      - ./mysql:/var/lib/mysql
    networks:
      - app-network
    container_name: zitazi-mysql
    restart: unless-stopped

  redis:
    image: redis:latest
    ports:
      - "6380:6379"
    volumes:
      - ./redis:/data
    networks:
      - app-network
    container_name: zitazi-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  node:
    build:
      context: ./node
      dockerfile: Dockerfile
    container_name: zitazi-node
    restart: unless-stopped
    networks:
      - app-network
    environment:
      TZ: Asia/Tehran
    shm_size: "1gb"
    mem_limit: 1500m


volumes:
  mysql:
  redis:

networks:
  app-network:
    driver: bridge
