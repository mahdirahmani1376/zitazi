name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH to VPS and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd ~/zitazi

            echo "🔴 Stopping Horizon gracefully..."
            docker exec zitazi-php php artisan horizon:terminate
            echo "🔄 Pulling latest code..."
            git pull origin master
            echo "Running migrations..."
            docker exec zitazi-php php artisan migrate --force


