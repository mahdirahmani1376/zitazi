name: Build & Deploy Zitazi

on:
  push:
    branches: [ "master" ]

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetches full history for better caching/context

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          username: ${{ github.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push PHP image
        uses: docker/build-push-action@v7
        with:
          file: Dockerfile
          context: .
          push: true
          tags: mahdirahmanii/zitazi-php:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Node image
        uses: docker/build-push-action@v7
        with:
          file: Dockerfile-production
          context: ./node
          push: true
          tags: mahdirahmanii/zitazi-node:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      # ---------------------------
      # 1. SSH into VPS and deploy
      # ---------------------------
      - name: SSH to VPS and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd ~/zitazi

            echo "Pulling latest images..."
            docker compose pull

            echo "Restarting containers..."
            docker compose up -d
            docker exec zitazi-php php artisan migrate --force
            
            echo "Cleaning old images..."
            docker image prune -f
            

