name: Build & Deploy Zitazi

on:
  push:
    branches: [ "master" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKER_BUILDKIT: 1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push PHP image
        uses: docker/build-push-action@v7
        with:
          file: Dockerfile.production
          context: ./src
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/zitazi-php:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Node image
        uses: docker/build-push-action@v7
        with:
          file: ./node/Dockerfile.production
          context: ./node
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/zitazi-node:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      # ---------------------------
      # 1. SSH into VPS and deploy
      # ---------------------------
      - name: SSH to VPS and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd ~/zitazi
            
            echo "Pulling latest images..."
            docker compose -f docker-compose.prod.yml pull
            
            echo "Recreating containers..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            
            echo "Running migrations..."
            docker exec zitazi-php php artisan migrate --force

            echo "Cleaning old images..."
            docker image prune -f
            

