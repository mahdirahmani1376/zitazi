name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Test SSH connection
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          ssh root@${{ secrets.VPS_HOST }} "echo ✅ SSH works"

      - name: Add VPS to known hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Checkout code
        uses: actions/checkout@v2

      - name: SSH to VPS and deploy
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/zitazi

            echo "🔄 Pulling latest code..."
            git pull origin master

            echo "📦 Running composer install inside container..."
            docker exec zitazi-php composer install --no-dev --optimize-autoloader

            echo "🧹 Running artisan migrate inside container..."
            docker exec zitazi-php php artisan migrate --force

            echo "🚀 Restarting Horizon inside container..."
            docker exec zitazi-horizon php artisan horizon:terminate

#            echo "🧹 Cleaning unused Docker images and containers..."
#            docker image prune -af
#            docker container prune -f
